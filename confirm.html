<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Member Access — Mountain Vista Estates</title>
  <script>
    window.netlifyIdentity = window.netlifyIdentity || {};
    window.netlifyIdentity.APIUrl = 'https://mountainvistaestates.ca/.netlify/identity';
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Lato', sans-serif;
      background: #faf6ef;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .spinner {
      width: 40px; height: 40px;
      border: 3px solid #e8d9c0;
      border-top-color: #4a6741;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Force widget iframe visible */
    #netlify-identity-widget {
      display: block !important;
      position: fixed !important;
      top: 0 !important; left: 0 !important;
      width: 100% !important; height: 100% !important;
      z-index: 9999 !important;
      border: none !important;
    }
  </style>
</head>
<body>
  <div class="spinner"></div>

  <script>
    // Redirect home if no token
    if (!window.location.hash.includes('invite_token=') && !window.location.hash.includes('recovery_token=')) {
      window.location.href = 'index.html';
    }

    // On successful password set → go to site
    netlifyIdentity.on('login', function() {
      netlifyIdentity.close();
      window.location.href = 'index.html';
    });

    netlifyIdentity.init();
  </script>
</body>
</html>
